<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EFL - Elite Football League</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        :root {
            --bg-dark: #020617;
            --efl-blue: #0f172a;
            --gold-gradient: linear-gradient(180deg, #f3e2b3 0%, #c5a059 50%, #8a6d3b 100%);
            --gold-text: #e2c07d;
        }
        body { background-color: var(--bg-dark); color: white; font-family: 'Arial Narrow', sans-serif; margin: 0; padding: 10px; min-height: 100vh; }
        .container { max-width: 500px; margin: auto; }
        header { text-align: center; padding: 15px 0; }
        .logo { width: 55px; height: 55px; border: 2px solid gold; border-radius: 50%; margin: 0 auto 10px; display: flex; align-items: center; justify-content: center; font-weight: bold; color: gold; box-shadow: 0 0 10px rgba(255,215,0,0.2); }
        .tabs { display: flex; gap: 4px; margin-bottom: 15px; }
        .tab-btn { flex: 1; padding: 12px 2px; border: 1px solid #c5a059; background: transparent; color: white; cursor: pointer; text-transform: uppercase; font-size: 0.7rem; font-weight: bold; }
        .tab-btn.active { background: var(--gold-gradient); color: black; }
        .hidden { display: none; }
        .admin-box { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 8px; border: 1px dashed var(--gold-text); margin-bottom: 15px; }
        .capture-area { background: var(--bg-dark); padding: 12px; border-radius: 8px; }
        .round-banner { background: var(--gold-gradient); color: black; text-align: center; font-weight: 900; padding: 8px; margin-bottom: 10px; border-radius: 2px; text-transform: uppercase; font-size: 0.8rem; }
        .fixture-card { background: var(--efl-blue); border: 1px solid rgba(197, 160, 89, 0.2); margin-bottom: 6px; display: flex; align-items: center; justify-content: space-between; padding: 12px; border-radius: 4px; }
        .fixture-card span { flex: 1; font-weight: bold; font-size: 0.85rem; }
        .vs-box { background: var(--gold-gradient); color: black; padding: 2px 8px; font-size: 0.65rem; border-radius: 3px; margin: 0 10px; font-weight: 900; }
        .fixture-card input { width: 35px; height: 25px; text-align: center; border: none; font-weight: bold; }
        .league-table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
        .league-table th { border-bottom: 1px solid var(--gold-text); color: var(--gold-text); padding: 10px 2px; }
        .league-table td { padding: 12px 2px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .pos-1 { background: var(--gold-gradient); color: black !important; font-weight: bold; }
        .btn-gold { background: var(--gold-gradient); border: none; padding: 14px; font-weight: bold; cursor: pointer; width: 100%; border-radius: 4px; margin-top: 10px; text-transform: uppercase; }
        .btn-download { background: #1e293b; color: var(--gold-text); border: 1px solid var(--gold-text); padding: 10px; width: 100%; margin-top: 10px; cursor: pointer; font-weight: bold; text-transform: uppercase; font-size: 0.7rem; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="logo">EFL</div>
        <h1 style="color:var(--gold-text); font-size:1.2rem; letter-spacing:2px; margin:0;">ELITE FOOTBALL LEAGUE</h1>
    </header>

    <div class="tabs">
        <button id="btn-fix" class="tab-btn active" onclick="switchTab('fixtures')">Matches</button>
        <button id="btn-tab" class="tab-btn" onclick="switchTab('table')">Standings</button>
        <button id="btn-stat" class="tab-btn" onclick="switchTab('stats')">Stats</button>
        <button id="btn-manage" class="tab-btn hidden" onclick="switchTab('manage')">Admin</button>
    </div>

    <div id="admin-auth" class="admin-box">
        <input type="password" id="pin" placeholder="Admin PIN" style="width:55%; padding:10px; background:#000; color:#fff; border:1px solid #444;">
        <button onclick="login()" style="width:38%; padding:10px; font-weight:bold; cursor:pointer;">LOGIN</button>
    </div>

    <div id="tab-fixtures">
        <select id="round-select" onchange="loadFixtures()" style="width:100%; padding:12px; margin-bottom:10px; background:#000; color:#fff; border:1px solid gold;"></select>
        <div id="capture-fixtures" class="capture-area">
            <div class="round-banner" id="current-round-label">MATCH DAY 1</div>
            <div id="fixture-list"></div>
        </div>
        <button id="save-btn" class="btn-gold hidden" onclick="saveScores()">SAVE TO CLOUD</button>
        <button class="btn-download" onclick="downloadImage('capture-fixtures', 'EFL-Matches.png')">Download Matches Image</button>
    </div>

    <div id="tab-table" class="hidden">
        <div id="capture-table" class="capture-area">
            <div class="round-banner">LEAGUE STANDINGS</div>
            <table class="league-table">
                <thead><tr><th>POS</th><th style="text-align:left">PLAYER</th><th>P</th><th>W</th><th>D</th><th>L</th><th>GD</th><th>PTS</th></tr></thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>
        <button class="btn-download" onclick="downloadImage('capture-table', 'EFL-Standings.png')">Download Table Image</button>
    </div>

    <div id="tab-stats" class="hidden">
        <div id="capture-stats" class="capture-area">
            <div class="round-banner">TOP ATTACK</div>
            <table class="league-table"><tbody id="attack-body"></tbody></table>
            <div class="round-banner" style="margin-top:20px">BEST DEFENCE</div>
            <table class="league-table"><tbody id="defence-body"></tbody></table>
        </div>
        <button class="btn-download" onclick="downloadImage('capture-stats', 'EFL-Stats.png')">Download Stats Image</button>
    </div>

    <div id="tab-manage" class="hidden">
        <div class="admin-box">
            <h3 style="color:gold; margin:0 0 10px 0;">Manage Teams</h3>
            <input type="text" id="new-team" placeholder="Team Name" style="width:65%; padding:10px;">
            <button onclick="addTeam()" style="width:30%; padding:10px;">ADD</button>
        </div>
        <div id="team-list-manage"></div>
        <button class="btn-gold" style="background:red; color:white; margin-top:30px;" onclick="resetAll()">RESET FULL SEASON</button>
    </div>
</div>

<script>
    // --- INTEGRATED FIREBASE CONFIG ---
    const firebaseConfig = {
      apiKey: "AIzaSyDuuJFzL6PtyxLXrzdQCSr_Qx9foZt4AIM",
      authDomain: "efl-league.firebaseapp.com",
      databaseURL: "https://efl-league-default-rtdb.firebaseio.com", 
      projectId: "efl-league",
      storageBucket: "efl-league.firebasestorage.app",
      messagingSenderId: "615309227319",
      appId: "1:615309227319:web:2f9b8a1f1613ac256456b2"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    let teamList = [];
    let dbScores = {};
    let isAdmin = false;

    // Real-time Listener
    database.ref('/').on('value', (snapshot) => {
        const data = snapshot.val() || {};
        teamList = data.teams || [];
        dbScores = data.scores || {};
        updateRoundSelector();
        loadFixtures();
        calculateEverything();
        if(isAdmin) renderManageList();
    });

    function switchTab(t) {
        ['fixtures', 'table', 'stats', 'manage'].forEach(id => document.getElementById('tab-'+id).classList.toggle('hidden', id !== t));
        ['btn-fix', 'btn-tab', 'btn-stat', 'btn-manage'].forEach(id => {
            if(document.getElementById(id)) document.getElementById(id).classList.toggle('active', id.includes(t.substring(0,3)));
        });
    }

    function login() {
        if(document.getElementById('pin').value === "1234") {
            isAdmin = true;
            document.getElementById('admin-auth').classList.add('hidden');
            document.getElementById('btn-manage').classList.remove('hidden');
            document.getElementById('save-btn').classList.remove('hidden');
            loadFixtures();
        } else { alert("Incorrect PIN"); }
    }

    function addTeam() {
        const name = document.getElementById('new-team').value.toUpperCase().trim();
        if(name) {
            teamList.push(name);
            database.ref('teams').set(teamList);
            document.getElementById('new-team').value = "";
        }
    }

    function removeTeam(i) {
        if(confirm("Delete this team?")) {
            teamList.splice(i, 1);
            database.ref('teams').set(teamList);
        }
    }

    function renderManageList() {
        const list = document.getElementById('team-list-manage');
        list.innerHTML = teamList.map((t, i) => `
            <div style="display:flex; justify-content:space-between; background:rgba(255,255,255,0.05); padding:10px; margin-bottom:5px;">
                <span>${t}</span>
                <button onclick="removeTeam(${i})" style="color:red; background:none; border:none; cursor:pointer;">REMOVE</button>
            </div>
        `).join('');
    }

    function updateRoundSelector() {
        const sel = document.getElementById('round-select');
        const cur = sel.value; sel.innerHTML = "";
        const rounds = teamList.length % 2 === 0 ? teamList.length - 1 : teamList.length;
        if(rounds < 1) return;
        for(let i=1; i<=rounds; i++) {
            let o = document.createElement('option'); o.value = i; o.text = "Match Day " + i;
            sel.appendChild(o);
        }
        if(cur && cur <= rounds) sel.value = cur;
    }

    function getMatches(r) {
        let t = [...teamList]; if(t.length % 2 !== 0) t.push("BYE");
        for(let i=1; i<r; i++) { t.splice(1, 0, t.pop()); }
        let m = []; for(let i=0; i<t.length/2; i++) m.push([t[i], t[t.length-1-i]]);
        return m;
    }

    function loadFixtures() {
        const r = document.getElementById('round-select').value || 1;
        document.getElementById('current-round-label').innerText = "MATCH DAY " + r;
        const list = document.getElementById('fixture-list');
        const matches = getMatches(r);
        const saved = dbScores[r] || {};
        list.innerHTML = "";
        matches.forEach((m, i) => {
            const key = m.sort().join("_vs_");
            const s1 = saved[key] ? saved[key][m[0]] : "";
            const s2 = saved[key] ? saved[key][m[1]] : "";
            list.innerHTML += `
                <div class="fixture-card">
                    <span style="text-align:right">${m[0]}</span>
                    ${isAdmin ? `<input type="number" id="sc1-${i}" value="${s1}">` : `<b style="font-size:1.1rem">${s1 !== "" ? s1 : '-'}</b>`}
                    <div class="vs-box">VS</div>
                    ${isAdmin ? `<input type="number" id="sc2-${i}" value="${s2}">` : `<b style="font-size:1.1rem">${s2 !== "" ? s2 : '-'}</b>`}
                    <span style="text-align:left">${m[1]}</span>
                </div>`;
        });
    }

    function saveScores() {
        const r = document.getElementById('round-select').value;
        const matches = getMatches(r);
        let data = {};
        matches.forEach((m, i) => {
            const key = m.sort().join("_vs_");
            const v1 = document.getElementById(`sc1-${i}`).value;
            const v2 = document.getElementById(`sc2-${i}`).value;
            if(v1 !== "" && v2 !== "") data[key] = {[m[0]]: parseInt(v1), [m[1]]: parseInt(v2)};
        });
        database.ref('scores/' + r).set(data);
        alert("League Cloud Updated!");
    }

    function calculateEverything() {
        let s = {}; teamList.forEach(t => s[t] = {name:t, p:0, w:0, d:0, l:0, gf:0, ga:0, pts:0});
        Object.values(dbScores).forEach(r => {
            Object.keys(r).forEach(k => {
                const teams = k.split("_vs_");
                if(!s[teams[0]] || !s[teams[1]]) return;
                const v1 = r[k][teams[0]], v2 = r[k][teams[1]];
                let t1 = s[teams[0]], t2 = s[teams[1]];
                t1.p++; t2.p++; t1.gf += v1; t1.ga += v2; t2.gf += v2; t2.ga += v1;
                if(v1 > v2) { t1.w++; t1.pts += 3; t2.l++; }
                else if(v2 > v1) { t2.w++; t2.pts += 3; t1.l++; }
                else { t1.d++; t1.pts += 1; t2.d++; t2.pts += 1; }
            });
        });
        const sorted = Object.values(s).sort((a,b) => b.pts - a.pts || (b.gf-b.ga) - (a.gf-a.ga));
        document.getElementById('table-body').innerHTML = sorted.map((t, i) => `
            <tr class="${i===0?'pos-1':''}"><td>${i+1}</td><td style="text-align:left; padding-left:10px;">${t.name}</td><td>${t.p}</td><td>${t.w}</td><td>${t.d}</td><td>${t.l}</td><td>${t.gf-t.ga}</td><td><b>${t.pts}</b></td></tr>
        `).join('');

        document.getElementById('attack-body').innerHTML = [...Object.values(s)].sort((a,b)=>b.gf-a.gf).slice(0,5).map((t,i)=>`<tr><td>${i+1}</td><td style="text-align:left">${t.name}</td><td style="color:gold; font-weight:bold;">${t.gf} Goals</td></tr>`).join('');
        document.getElementById('defence-body').innerHTML = [...Object.values(s)].filter(t=>t.p>0).sort((a,b)=>a.ga-b.ga).slice(0,5).map((t,i)=>`<tr><td>${i+1}</td><td style="text-align:left">${t.name}</td><td style="color:#4ade80; font-weight:bold;">${t.ga} GA</td></tr>`).join('');
    }

    function downloadImage(id, name) {
        const area = document.getElementById(id);
        html2canvas(area, { backgroundColor: "#020617", scale: 2 }).then(canvas => {
            const link = document.createElement('a');
            link.download = name; link.href = canvas.toDataURL(); link.click();
        });
    }

    function resetAll() { if(confirm("This will wipe all data for a new season. Continue?")) database.ref('/').set({teams: [], scores: {}}); }
</script>
</body>
    </html>
