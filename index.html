<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Football League</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">EFL</div>
            <h1>LEAGUE TABLE</h1>
        </header>

        <div id="admin-auth">
            <input type="password" id="admin-pass" placeholder="Enter Admin Password">
            <button onclick="checkAuth()">Login to Update</button>
        </div>

        <div id="admin-panel" style="display: none;">
            <h3>Update Round Scores</h3>
            <div id="fixtures-input-list"></div>
            <button class="save-btn" onclick="processScores()">Update Table</button>
        </div>

        <table id="league-table">
            <thead>
                <tr>
                    <th>POS</th>
                    <th class="team-col">TEAM</th>
                    <th>P</th>
                    <th>W</th>
                    <th>D</th>
                    <th>L</th>
                    <th>GF</th>
                    <th>GA</th>
                    <th>GD</th>
                    <th>Pts</th>
                </tr>
            </thead>
            <tbody id="table-body">
                </tbody>
        </table>
    </div>
    <script src="script.js"></script>
</body>
</html>
